<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" role="img" aria-labelledby="title desc">
  <title id="title">Data and AI Operating Model</title>
  <desc id="desc">End-to-end operating model from business strategy through data and AI strategy, Data and AI governance, platform foundation, DataOps, MLOps, LLMOps, and AIOps to business value.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    ]]></style>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="mlopsAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#6366f1"/>
    </marker>
    <filter id="card" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1e1b4b" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="1020" fill="url(#pageBg)" rx="12"/>

  <!-- Layer labels -->
  <text x="24" y="52" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">LAYER 1</text>
  <text x="24" y="152" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">LAYER 2</text>
  <text x="24" y="268" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">LAYER 3</text>
  <text x="24" y="428" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">LAYER 4</text>
  <text x="24" y="588" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">LAYER 5</text>
  <text x="24" y="932" font-size="11" font-weight="700" fill="#9ca3af" letter-spacing="0.08em">VALUE</text>

  <!-- L1 Business -->
  <g filter="url(#card)">
