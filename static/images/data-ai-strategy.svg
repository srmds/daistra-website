    <text x="870" y="144" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">AI Strategy</text>
    <text x="870" y="168" text-anchor="middle" font-size="12" fill="#6d28d9">Use-case portfolio · GenAI &amp; agents · Build / buy / partner</text>
    <text x="870" y="186" text-anchor="middle" font-size="12" fill="#6d28d9">AI literacy · Team design · Value hypothesis &amp; ROI</text>
  </g>

