    <text x="600" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">Business Strategy</text>
    <text x="600" y="74" text-anchor="middle" font-size="13" fill="#b45309">Vision · OKRs · Prioritization · Investment · Change management</text>
  </g>

  <line x1="600" y1="88" x2="600" y2="108" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

