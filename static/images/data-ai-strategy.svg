    <text x="110" y="598" font-size="11" fill="#374151">• Transformation &amp; modeling</text>
    <text x="110" y="620" font-size="11" fill="#374151">• Storage &amp; lakehouse</text>
    <text x="110" y="642" font-size="11" fill="#374151">• Orchestration &amp; scheduling</text>
    <text x="110" y="664" font-size="11" fill="#374151">• Data testing &amp; contracts</text>
    <text x="110" y="686" font-size="11" fill="#374151">• Monitoring &amp; alerting</text>
    <text x="110" y="708" font-size="11" fill="#374151">• CI/CD for data</text>
    <text x="110" y="730" font-size="11" fill="#374151">• Self-serve analytics</text>
    <text x="110" y="752" font-size="11" fill="#374151">• Data team enablement</text>
    <text x="205" y="832" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Reliable data for decisions</text>
  </g>

