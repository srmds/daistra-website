  <text x="600" y="270" text-anchor="middle" font-size="12" fill="#6366f1">Shared controls · Policy · Risk · Compliance · Oversight</text>

  <rect x="96" y="286" width="492" height="48" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <rect x="612" y="286" width="492" height="48" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="2"/>

  <text x="342" y="306" text-anchor="middle" font-size="15" font-weight="700" fill="#115e59">Data Governance</text>
  <text x="342" y="324" text-anchor="middle" font-size="11" fill="#0f766e">Quality · Catalog · Privacy · Ownership · Lineage</text>

  <text x="858" y="306" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">AI Governance</text>
  <text x="858" y="324" text-anchor="middle" font-size="11" fill="#c7d2fe">Model registry · Ethics · Risk · Compliance · Human oversight</text>

