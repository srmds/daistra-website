    <text x="380" y="598" font-size="11" fill="#374151">• Feature engineering</text>
    <text x="380" y="620" font-size="11" fill="#374151">• Model training &amp; tuning</text>
    <text x="380" y="642" font-size="11" fill="#374151">• Offline evaluation</text>
    <text x="380" y="664" font-size="11" fill="#374151">• Model registry &amp; versioning</text>
    <text x="380" y="686" font-size="11" fill="#374151">• Batch &amp; real-time serving</text>
    <text x="380" y="708" font-size="11" fill="#374151">• Drift &amp; performance monitoring</text>
    <text x="380" y="730" font-size="11" fill="#374151">• Retraining pipelines</text>
    <text x="380" y="752" font-size="11" fill="#374151">• A/B testing &amp; champion/challenger</text>
    <text x="475" y="832" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Models in production</text>
