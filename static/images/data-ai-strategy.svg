    <text x="330" y="144" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">Data Strategy</text>
    <text x="330" y="168" text-anchor="middle" font-size="12" fill="#1d4ed8">Roadmap · Domain ownership · Data as product · Maturity model</text>
    <text x="330" y="186" text-anchor="middle" font-size="12" fill="#1d4ed8">Quality SLAs · Integration patterns · Analytics &amp; insights</text>
  </g>
  <g filter="url(#card)">
