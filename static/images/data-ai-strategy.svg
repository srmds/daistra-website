    <text x="650" y="598" font-size="11" fill="#374151">• Prompt management &amp; versioning</text>
    <text x="650" y="620" font-size="11" fill="#374151">• LLM evaluation &amp; benchmarks</text>
    <text x="650" y="642" font-size="11" fill="#374151">• Safety filters &amp; guardrails</text>
    <text x="650" y="664" font-size="11" fill="#374151">• Agent orchestration</text>
    <text x="650" y="686" font-size="11" fill="#374151">• Human-in-the-loop review</text>
    <text x="650" y="708" font-size="11" fill="#374151">• Token &amp; cost management</text>
    <text x="650" y="730" font-size="11" fill="#374151">• Caching &amp; latency optimization</text>
    <text x="650" y="752" font-size="11" fill="#374151">• Red-teaming &amp; bias testing</text>
    <text x="745" y="832" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">GenAI you can trust</text>
  </g>

  <!-- AIOps column -->
  <g filter="url(#card)">
    <rect x="890" y="484" width="230" height="372" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <rect x="890" y="484" width="230" height="44" rx="10" fill="#6366f1"/>
    <rect x="890" y="504" width="230" height="24" fill="#6366f1"/>
    <line x1="890" y1="484" x2="1120" y2="484" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
    <text x="1005" y="512" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">AIOps</text>
    <text x="1005" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">AI system operations</text>
    <text x="920" y="576" font-size="11" fill="#374151">• End-to-end observability</text>
    <text x="920" y="598" font-size="11" fill="#374151">• SLOs &amp; error budgets</text>
    <text x="920" y="620" font-size="11" fill="#374151">• Incident &amp; root-cause analysis</text>
    <text x="920" y="642" font-size="11" fill="#374151">• Auto-remediation</text>
    <text x="920" y="664" font-size="11" fill="#374151">• Capacity &amp; scaling</text>
    <text x="920" y="686" font-size="11" fill="#374151">• FinOps for AI workloads</text>
    <text x="920" y="708" font-size="11" fill="#374151">• Runbooks &amp; on-call</text>
    <text x="920" y="730" font-size="11" fill="#374151">• Platform reliability</text>
    <text x="920" y="752" font-size="11" fill="#374151">• Continuous optimization</text>
    <text x="1005" y="832" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">AI that stays healthy</text>
  </g>

  <!-- Flow arrows between ops -->
  <path d="M330 674 L350 674" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M600 674 L620 674" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M870 674 L890 674" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="600" y1="856" x2="600" y2="896" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Value layer -->
  <g filter="url(#card)">
    <rect x="80" y="904" width="1040" height="72" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="600" y="934" text-anchor="middle" font-size="18" font-weight="700" fill="#065f46">Business Value &amp; Continuous Improvement</text>
    <text x="600" y="958" text-anchor="middle" font-size="12" fill="#047857">Outcome metrics · Feedback loops · Scale what works · Retire what doesn't</text>
  </g>

  <text x="600" y="996" text-anchor="middle" font-size="12" font-weight="600" fill="#6366f1">Daistra Operating Model: Data · AI · XOps · Governance</text>
</svg>
